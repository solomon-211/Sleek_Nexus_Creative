name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: Sleek_Nexus_Creative/frontend-react/package-lock.json

      - name: Install dependencies
        working-directory: Sleek_Nexus_Creative/frontend-react
        run: npm ci

      - name: Build
        working-directory: Sleek_Nexus_Creative/frontend-react
        run: npm run build
        env:
          VITE_EMAILJS_SERVICE_ID: ${{ secrets.VITE_EMAILJS_SERVICE_ID }}
          VITE_EMAILJS_CONTACT_TEMPLATE_ID: ${{ secrets.VITE_EMAILJS_CONTACT_TEMPLATE_ID }}
          VITE_EMAILJS_NEWSLETTER_TEMPLATE_ID: ${{ secrets.VITE_EMAILJS_NEWSLETTER_TEMPLATE_ID }}
          VITE_EMAILJS_PUBLIC_KEY: ${{ secrets.VITE_EMAILJS_PUBLIC_KEY }}

      - name: Deploy
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: Sleek_Nexus_Creative/frontend-react/dist
          cname: sleeknexuscreative.com
