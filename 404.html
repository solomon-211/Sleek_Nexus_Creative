<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <script>
      // GitHub Pages SPA redirect — sends 404s back to index.html
      // so React Router can handle the route client-side.
      const path = window.location.pathname
      const search = window.location.search
      const hash = window.location.hash
      const redirectUrl = '/?p=' + encodeURIComponent(path) + (search ? '&q=' + encodeURIComponent(search.slice(1)) : '') + hash
      window.location.replace(redirectUrl)
    </script>
  </head>
  <body></body>
</html>
